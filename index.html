<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<title>Feedback</title>
<style>
  :root {
    --bg:           #FAFAFA;
    --panel:        #FFFFFF;
    --panel-edge:   #E5E5E5;
    --input-bg:     #FFFFFF;
    --input-edge:   #D4D4D4;

    --text:         #1A1A1A;
    --text-muted:   #6B6B6B;
    --text-faint:   #9A9A9A;

    --accent:       #4DA3FF;
    --accent-fg:    #FFFFFF;
    --bad:          #C44133;

    --radius:       12px;
    --radius-sm:    8px;

    --font:         -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .wrap {
    padding: 48px 16px 32px;
    padding-top: max(48px, env(safe-area-inset-top, 0) + 24px);
    padding-bottom: max(32px, env(safe-area-inset-bottom, 0) + 16px);
    display: flex;
    justify-content: center;
  }
  @media (min-width: 640px) {
    .wrap { padding-top: 10vh; }
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: var(--radius);
    padding: 24px;
  }
  @media (min-width: 640px) {
    .card { padding: 32px; }
  }

  .brand {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 20px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 10px;
    line-height: 1.25;
  }
  .sub {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0 0 20px;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--input-edge);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.5;
    resize: vertical;
    transition: border-color 0.15s ease;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea::placeholder { color: var(--text-faint); }

  .meta-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }

  .error {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(196, 65, 51, 0.06);
    border-left: 2px solid var(--bad);
    color: var(--bad);
    border-radius: 4px;
    font-size: 13px;
  }

  .actions {
    margin-top: 16px;
  }

  .btn {
    width: 100%;
    min-height: 48px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
  }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--input-edge);
    min-height: 44px;
  }
  .btn-secondary:hover { background: rgba(0, 0, 0, 0.04); }

  /* Success panel */
  .success {
    text-align: center;
    padding: 16px 0 4px;
  }
  .success-mark {
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 16px;
  }
  .success-msg {
    font-size: 16px;
    color: var(--text);
    margin: 0 0 24px;
  }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<div class="wrap">
  <main class="card" aria-labelledby="headline">
    <p class="brand">FEEDBACK</p>

    <section id="form-panel">
      <h1 id="headline">What do you think?</h1>
      <p class="sub">What worked for you on this app? What didn't? Say it like you'd say it to a friend, the specifics really help.</p>

      <form id="form" novalidate>
        <label for="feedback" class="visually-hidden">Your feedback</label>
        <textarea
          id="feedback"
          name="feedback"
          placeholder="Type your feedback here…"
          autocomplete="off"
          autocapitalize="sentences"
          spellcheck="true"
          autofocus
        ></textarea>
        <div class="meta-row">
          <span id="char-count">0 chars</span>
        </div>

        <div id="error" class="error" role="alert" hidden>
          Something went wrong. Your feedback is still here — try again?
        </div>

        <div class="actions">
          <button type="submit" id="submit-btn" class="btn btn-primary" disabled>Send feedback</button>
        </div>
      </form>
    </section>

    <section id="success-panel" class="success" hidden aria-live="polite">
      <div class="success-mark" aria-hidden="true">✓</div>
      <p class="success-msg">Thanks — your feedback is in the queue. Agents are on it.</p>
      <button type="button" id="send-another-btn" class="btn btn-secondary">Send another</button>
    </section>
  </main>
</div>

<script>
  'use strict';

  const BACKEND_URL = 'https://ericaceous-tyisha-homiletically.ngrok-free.dev/sms';
  const TIMEOUT_MS  = 10000;

  const form          = document.getElementById('form');
  const textarea      = document.getElementById('feedback');
  const charCount     = document.getElementById('char-count');
  const submitBtn     = document.getElementById('submit-btn');
  const errorEl       = document.getElementById('error');
  const formPanel     = document.getElementById('form-panel');
  const successPanel  = document.getElementById('success-panel');
  const sendAnotherBtn = document.getElementById('send-another-btn');

  let isSubmitting = false;

  function updateCharCount() {
    const n = textarea.value.length;
    charCount.textContent = n + (n === 1 ? ' char' : ' chars');
  }

  function updateSubmitEnabled() {
    submitBtn.disabled = isSubmitting || textarea.value.trim().length === 0;
  }

  function setSubmitting(yes) {
    isSubmitting = yes;
    submitBtn.textContent = yes ? 'Sending…' : 'Send feedback';
    updateSubmitEnabled();
  }

  function showError() {
    errorEl.hidden = false;
  }

  function clearError() {
    errorEl.hidden = true;
  }

  function showSuccess() {
    formPanel.hidden = true;
    successPanel.hidden = false;
  }

  function resetToIdle() {
    textarea.value = '';
    clearError();
    updateCharCount();
    successPanel.hidden = true;
    formPanel.hidden = false;
    setSubmitting(false);
    textarea.focus();
  }

  function randomFormId() {
    return 'form-' + Math.random().toString(36).slice(2, 10);
  }

  async function postFeedback(text) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);
    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ From: randomFormId(), Body: text }),
        signal: controller.signal,
      });
      return res.ok;
    } catch {
      return false;
    } finally {
      clearTimeout(timer);
    }
  }

  textarea.addEventListener('input', () => {
    updateCharCount();
    clearError();
    updateSubmitEnabled();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (isSubmitting) return;
    const text = textarea.value.trim();
    if (!text) return;

    clearError();
    setSubmitting(true);

    const ok = await postFeedback(text);

    if (ok) {
      showSuccess();
      setSubmitting(false);
    } else {
      setSubmitting(false);
      showError();
    }
  });

  sendAnotherBtn.addEventListener('click', resetToIdle);

  updateCharCount();
  updateSubmitEnabled();
</script>

</body>
</html>
